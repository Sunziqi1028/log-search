<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Log Viewer</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:Consolas,Monospace}
        html,body {height:100%;}
        body {display:flex;height:100%;overflow:hidden}
        .sidebar {width:260px;background:#222;color:#ddd;padding:10px;overflow-y:auto;flex-shrink:0}
        .sidebar h3 {margin-bottom:10px;color:#fff;font-size:15px}
        .log-item {
            padding:6px 8px;margin:4px 0;
            cursor:pointer;border-radius:4px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        .log-item:hover {background:#444}
        .log-item.active {background:#0066cc;color:#fff}
        .download-file-btn {
            font-size:12px;
            padding:2px 6px;
            background:#009966;
            color:#fff;
            border:none;
            border-radius:3px;
            cursor:pointer;
        }
        .download-file-btn:hover {background:#00bb77}
        .main {flex:1;display:flex;flex-direction:column;height:100%;min-width:0;}
        .tab-bar {
            height:36px;
            background:#2a2a2a;
            display:flex;
            align-items:center;
            padding:0 8px;
            gap:4px;
            overflow-x:auto;
            flex-shrink:0;
        }
        .tab-bar::-webkit-scrollbar {height:3px}
        .log-tab {
            height:28px;
            padding:0 10px;
            background:#444;
            color:#ddd;
            display:flex;
            align-items:center;
            gap:8px;
            border-radius:4px 4px 0 0;
            cursor:pointer;
            white-space:nowrap;
            flex-shrink:0;
        }
        .log-tab.active {background:#0066cc;color:#fff}
        .tab-close {
            width:16px;height:16px;
            line-height:16px;
            text-align:center;
            border-radius:50%;
            font-size:12px;
        }
        .tab-close:hover {background:rgba(255,255,255,0.2)}
        .empty-tab-tip {color:#888;font-size:13px}
        .toolbar {
            height:36px;
            background:#333;
            display:flex;
            align-items:center;
            padding:0 8px;
            gap:6px;
            flex-wrap: nowrap;
            flex-shrink:0;
        }
        #searchInput {
            flex:1;
            padding:4px 6px;
            font-size:14px;
            max-width: 720px;
            min-width:0;
        }
        .toolbar-right {
            display:flex;
            gap:6px;
            align-items:center;
            flex-shrink: 0;
        }
        .color-group {
            display:flex;
            gap:4px;
            align-items:center;
        }
        .color-group span {
            width:22px;
            height:22px;
            display:inline-block;
            cursor:pointer;
            border:1px solid #fff;
            border-radius:2px;
        }
        .color-group span.active {outline:2px solid #fff;outline-offset:2px}
        .tool-btn {
            padding:3px 8px;
            cursor:pointer;
            border:none;
            border-radius:3px;
            color:#fff;
            font-size:13px;
        }
        #searchBtn {background:#00ccff;color:#111}
        #markBtn {background:#00cc66}
        #copyBtn {background:#0099cc}
        #clearMarkBtn {background:#ff4444}
        .log-wrap {
            flex:1;
            display:flex;
            flex-direction:column;
            overflow:hidden;
            min-width:0;
        }
        .log-box-wrap {
            flex:1;
            display:flex;
            flex-direction:column;
            overflow:hidden;
            min-width:0;
        }
        .log-container {
            background:#111;
            color:#eee;
            overflow-x: scroll !important;
            overflow-y: scroll !important;
            padding:8px;
            flex: 1;
            width:100%;
            min-width:0;
            /* 虚拟滚动：用占位撑开高度 */
            position: relative;
        }
        .log-spacer {
            position: absolute;
            left: 0;
            right: 0;
            pointer-events: none;
        }
        .log-content {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
        }
        .log-line-stat {
            height:24px;
            line-height:24px;
            padding:0 10px;
            background:#222;
            color:#aaa;
            font-size:13px;
            flex-shrink:0;
            width:100%;
        }
        .line {
            white-space: pre !important;
            word-break: normal !important;
            word-wrap: normal !important;
            min-height:20px;
            padding:2px 4px;
            cursor:pointer;
            user-select:text;
            -webkit-user-select:text;
            min-width:max-content;
            flex-shrink:0;
        }
        .line.selected {outline:2px solid #00ccff}
        .match {background:#ff0;color:#000}
        .resize-splitter {
            height:6px;
            background:#555;
            cursor:n-resize;
            user-select:none;
            flex-shrink:0;
        }
        .resize-splitter:hover {
            background:#00ccff;
        }
        .search-result-panel {
            background:#1a1a1a;
            display:flex;
            flex-direction:column;
            min-height:80px;
            max-height:70vh;
            height: 220px;
            width:100%;
            min-width:0;
        }
        .result-title {
            height:32px;
            line-height:32px;
            padding:0 10px;
            background:#333;
            color:#fff;
            font-size:14px;
            flex-shrink: 0;
            width:100%;
        }
        .result-box {
            flex:1;
            overflow-x: scroll !important;
            overflow-y: auto !important;
            padding:8px;
            color:#eee;
            width:100%;
            min-width:0;
        }
        .result-box::-webkit-scrollbar:horizontal {height:6px;}
        .log-container::-webkit-scrollbar:horizontal {height:6px;}
        .result-line {
            padding:3px 6px;
            margin:2px 0;
            background:#222;
            cursor:pointer;
            white-space: pre !important;
            word-break: normal !important;
            word-wrap: normal !important;
            user-select:text;
            -webkit-user-select:text;
            min-width: max-content;
            flex-shrink:0;
        }
        .result-line:hover {background:#333}
        .empty-tip {color:#999;text-align:center;padding:20px}
        .loading-tip {color:#888;text-align:center;padding:20px}
    </style>
</head>
<body>
<div class="sidebar">
    <h3>日志文件列表</h3>
    <div id="fileList"></div>
</div>
<div class="main">
    <div class="tab-bar" id="tabBar">
        <span class="empty-tab-tip">未打开任何日志文件</span>
    </div>
    <div class="toolbar">
        <input id="searchInput" placeholder="输入关键字...">
        <div class="toolbar-right">
            <div class="color-group">
                <span style="background:#00ffff" data-color="#00ffff"></span>
                <span style="background:#ff8800" data-color="#ff8800"></span>
                <span style="background:#ffff00" data-color="#ffff00"></span>
                <span style="background:#8800ff" data-color="#8800ff"></span>
                <span style="background:#008800" data-color="#008800"></span>
            </div>
            <button class="tool-btn" id="searchBtn">搜索关键字</button>
            <button class="tool-btn" id="markBtn">标记当前选中行</button>
            <button class="tool-btn" id="copyBtn">复制选中行</button>
            <button class="tool-btn" id="clearMarkBtn">清除所有标记</button>
        </div>
    </div>
    <div class="log-wrap" id="logWrap">
        <div class="log-box-wrap">
            <div class="log-container" id="logBox"></div>
            <div class="log-line-stat" id="logLineStat">当前渲染行数：0</div>
        </div>
        <div class="resize-splitter" id="splitter"></div>
        <div class="search-result-panel" id="resultPanel">
            <div class="result-title">查找结果 <span id="matchCount">0</span> 条命中 | 面板展示：<span id="resultShowCount">0</span> 行</div>
            <div class="result-box" id="resultBox">
                <div class="empty-tip">输入关键词点击搜索，匹配内容将展示在此处</div>
            </div>
        </div>
    </div>
</div>
<script>
    const API_BASE = "";
    let currentFile = "";
    let allLines = [];
    let markMap = JSON.parse(localStorage.getItem("logMarkMap") || "{}");
    let searchKeyword = "";
    let selectLineIndex = null;
    window.selectColor = "#00ffff";
    let matchLines = [];
    let tabList = [];

    // 虚拟滚动
    const ROW_HEIGHT = 24; // 每行高度（含 padding）
    let startIdx = 0;
    let endIdx = 0;
    let totalLinesCount = 0;
    let isLoading = false;

    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);

    window.onload = () => {
        refreshFileList();
        bindEvent();
        bindResizeSplitter();
        $$(".color-group span")[0].classList.add("active");
        const savedHeight = localStorage.getItem("resultPanelHeight");
        if(savedHeight) $("#resultPanel").style.height = savedHeight + "px";
        $("#logLineStat").innerText = "当前渲染行数：0";
        $("#matchCount").innerText = "0";
        $("#resultShowCount").innerText = "0";
    }

    function bindResizeSplitter() {
        const splitter = $("#splitter");
        const wrap = $("#logWrap");
        const panel = $("#resultPanel");
        let isDrag = false;
        splitter.onmousedown = (e) => {
            isDrag = true;
            document.body.style.cursor = "n-resize";
            document.body.style.userSelect = "none";
        }
        document.onmousemove = (e) => {
            if(!isDrag) return;
            const wrapRect = wrap.getBoundingClientRect();
            let panelH = wrapRect.bottom - e.clientY;
            const minH = 80;
            const maxH = window.innerHeight * 0.7;
            if(panelH < minH) panelH = minH;
            if(panelH > maxH) panelH = maxH;
            panel.style.height = panelH + "px";
        }
        document.onmouseup = () => {
            if(isDrag) {
                isDrag = false;
                document.body.style.cursor = "";
                document.body.style.userSelect = "";
                localStorage.setItem("resultPanelHeight", panel.style.height.replace("px",""));
            }
        }
    }

    function renderTabBar() {
        const bar = $("#tabBar");
        if(tabList.length === 0) {
            bar.innerHTML = '<span class="empty-tab-tip">未打开任何日志文件</span>';
            return;
        }
        bar.innerHTML = "";
        tabList.forEach(item => {
            const tab = document.createElement("div");
            tab.className = "log-tab" + (item.name === currentFile ? " active" : "");
            tab.innerHTML = `<span>${item.name}</span><span class="tab-close" data-name="${item.name}">×</span>`;
            tab.onclick = e => {
                if(e.target.classList.contains("tab-close")) return;
                switchTab(item.name);
            }
            tab.querySelector(".tab-close").onclick = e => {
                e.stopPropagation();
                closeTab(item.name);
            }
            bar.appendChild(tab);
        })
    }

    function switchTab(filename) {
        const target = tabList.find(t => t.name === filename);
        if(!target) return;
        currentFile = target.name;
        allLines = target.lines || [];
        totalLinesCount = target.totalLines || allLines.length;
        searchKeyword = "";
        matchLines = [];
        selectLineIndex = null;
        $("#searchInput").value = "";
        renderTabBar();
        loadAndRender();
        renderResultPanel();
        $$(".log-item").forEach(el=>el.classList.remove("active"));
        document.querySelector(`[data-file="${filename}"]`)?.classList.add("active");
    }

    function saveCurrentTabData() {
        const idx = tabList.findIndex(t => t.name === currentFile);
        if(idx > -1) {
            tabList[idx].lines = allLines;
        }
    }

    function closeTab(filename) {
        saveCurrentTabData();
        tabList = tabList.filter(t => t.name !== filename);
        if(currentFile === filename) {
            if(tabList.length > 0) {
                switchTab(tabList[tabList.length - 1].name);
            } else {
                currentFile = "";
                allLines = [];
                $("#logBox").innerHTML = "";
                $("#logLineStat").innerText = "当前渲染行数：0";
                matchLines = [];
                renderResultPanel();
            }
        }
        renderTabBar();
    }

    async function openFile(filename) {
        if(filename === currentFile) return;
        saveCurrentTabData();
        if(!tabList.some(t => t.name === filename)) {
            tabList.push({name: filename, lines: []})
        }
        await switchTab(filename);
    }

    async function downloadLogFile(filename) {
        if(!filename) return alert("请选择日志文件");
        try {
            const res = await fetch(`${API_BASE}/api/log/download?file=${encodeURIComponent(filename)}`, {responseType: "blob"});
            if(!res.ok) throw new Error("文件读取失败");
            const blob = await res.blob();
            const a = document.createElement("a");
            const url = URL.createObjectURL(blob);
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            URL.revokeObjectURL(url);
            document.body.removeChild(a);
        } catch(err) {
            alert("下载失败：" + err.message);
            console.error("下载日志报错：", err);
        }
    }

    async function refreshFileList() {
        try {
            const res = await fetch(`${API_BASE}/api/log/files`).then(r=>r.json());
            const listEl = $("#fileList");
            listEl.innerHTML = "";
            if (!res || res.length === 0) {
                listEl.innerHTML = '<div style="color:#999;padding:8px">暂无日志文件</div>';
                return;
            }
            res.forEach(f => {
                const div = document.createElement("div");
                div.className = "log-item";
                div.dataset.file = f.name;
                div.innerHTML = `<span title="大小:${formatSize(f.size)}\n修改时间:${f.mtime}">${f.name}</span><button class="download-file-btn" data-filename="${f.name}">下载</button>`;
                div.onclick = (e) => {
                    if(e.target.classList.contains("download-file-btn")) return;
                    openFile(f.name);
                }
                div.querySelector(".download-file-btn").onclick = e => {
                    e.stopPropagation();
                    downloadLogFile(f.name);
                }
                if(f.name === currentFile) div.classList.add("active");
                listEl.appendChild(div);
            })
        } catch(err) {
            $("#fileList").innerHTML = '<div style="color:#f66;padding:8px">接口加载失败，请检查后端服务</div>';
            console.error("获取文件列表失败：", err);
        }
    }

    async function loadAndRender() {
        if(!currentFile || isLoading) return;
        isLoading = true;
        try {
            const url = `${API_BASE}/api/log/read?file=${encodeURIComponent(currentFile)}`;
            const data = await fetch(url).then(r=>r.json());
            allLines = data.lines || [];
            totalLinesCount = data.totalLines || allLines.length;
            // 初始化虚拟滚动容器
            initVirtualScroll();
        } catch(err) {
            $("#logBox").innerHTML = `<div style="color:#f66;padding:10px">读取日志失败：${err.message}</div>`;
            $("#logLineStat").innerText = "当前渲染行数：0";
        }
        isLoading = false;
    }

    // ========== 虚拟滚动：只渲染可见区域的行 ==========
    function initVirtualScroll() {
        const box = $("#logBox");
        if (!allLines.length) {
            box.innerHTML = "";
            $("#logLineStat").innerText = "共 0 行";
            return;
        }

        // 创建占位 spacer 撑开高度
        const totalH = allLines.length * ROW_HEIGHT;
        box.innerHTML = `<div class="log-spacer" style="height:${totalH}px"></div><div class="log-content"></div>`;

        // 绑定滚动事件
        box.onscroll = onLogScroll;

        // 首次渲染
        renderVisible();
    }

    function onLogScroll() {
        requestAnimationFrame(renderVisible);
    }

    function renderVisible() {
        const box = $("#logBox");
        const content = box.querySelector(".log-content");
        if (!content) return;

        const st = box.scrollTop;
        const ch = box.clientHeight;

        // 计算可见范围（上下各多渲染 20 行作为缓冲）
        startIdx = Math.max(0, Math.floor(st / ROW_HEIGHT) - 20);
        endIdx = Math.min(allLines.length, Math.ceil((st + ch) / ROW_HEIGHT) + 20);

        let html = "";
        for (let i = startIdx; i < endIdx; i++) {
            const text = allLines[i];
            if (text === undefined || text === null) continue;

            // 转义 HTML
            let displayText = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            if (searchKeyword) {
                const reg = new RegExp(`(${escapeRegex(searchKeyword)})`, "gi");
                displayText = displayText.replace(reg, '<span class="match">$1</span>');
            }

            let cls = "line";
            let style = "";
            if (markMap[`${currentFile}-${i}`]) {
                style = ` style="background:${markMap[`${currentFile}-${i}`]}"`;
            }
            if (i === selectLineIndex) cls += " selected";

            html += `<div class="${cls}" data-line-idx="${i}"${style} onclick="selectRow(${i})"><span style="color:#666;margin-right:12px;user-select:none;min-width:40px;display:inline-block;text-align:right;">${i+1}</span>${displayText}</div>`;
        }

        content.innerHTML = html;

        // 用 transform 保持滚动位置
        const translateY = startIdx * ROW_HEIGHT;
        content.style.transform = `translateY(${translateY}px)`;

        $("#logLineStat").innerText = `共 ${totalLinesCount.toLocaleString()} 行 | 渲染 ${endIdx - startIdx} 行 (索引 ${startIdx}~${endIdx})`;
    }

    function selectRow(idx) {
        selectLineIndex = idx;
        renderVisible();
    }

    function escapeRegex(s) {
        return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function renderResultPanel() {
        const resultBox = $("#resultBox");
        const countDom = $("#matchCount");
        const showCountDom = $("#resultShowCount");
        countDom.innerText = String(matchLines.length);
        showCountDom.innerText = String(matchLines.length);
        resultBox.innerHTML = "";
        if(matchLines.length === 0) {
            resultBox.innerHTML = `<div class="empty-tip">输入关键词点击搜索，匹配内容将展示在此处</div>`;
            return;
        }
        matchLines.forEach(item => {
            const text = item.content;
            const targetLineNo = item.lineNo;
            if(text === undefined || text === null) return;
            const div = document.createElement("div");
            div.className = "result-line";
            div.dataset.lineNo = targetLineNo;
            const reg = new RegExp(`(${searchKeyword})`,"gi");
            div.innerHTML = `<span style="color:#888;margin-right:8px;user-select:none;">[${targetLineNo}]</span>` + text.replace(reg, `<span class="match">$1</span>`);
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                const targetIdx = targetLineNo - 1; // lineNo is 1-based, array index is 0-based
                selectLineIndex = targetIdx;
                const box = $("#logBox");
                // 先滚动到目标位置
                box.scrollTop = targetIdx * ROW_HEIGHT - box.clientHeight / 2;
                // 等待DOM更新后再渲染
                requestAnimationFrame(() => {
                    renderVisible();
                    // 再等一帧确保行已渲染
                    requestAnimationFrame(() => {
                        const el = box.querySelector(`.line[data-line-idx="${targetIdx}"]`);
                        if(el) {
                            el.scrollIntoView({behavior:"smooth",block:"center"});
                        }
                    });
                });
            });
            resultBox.appendChild(div);
        })
    }

    async function doSearch() {
        const val = $("#searchInput").value.trim();
        searchKeyword = val;
        if(!val){
            matchLines = [];
            renderResultPanel();
            // 重新渲染可见区域清除高亮
            const box = $("#logBox");
            const content = box?.querySelector(".log-content");
            if (content) {
                const st = box.scrollTop;
                const ch = box.clientHeight;
                startIdx = Math.max(0, Math.floor(st / ROW_HEIGHT) - 20);
                endIdx = Math.min(allLines.length, Math.ceil((st + ch) / ROW_HEIGHT) + 20);
                let html = "";
                for (let i = startIdx; i < endIdx; i++) {
                    const text = allLines[i];
                    if (text === undefined || text === null) continue;
                    let displayText = text
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                    let cls = "line";
                    let style = "";
                    if (markMap[`${currentFile}-${i}`]) {
                        style = ` style="background:${markMap[`${currentFile}-${i}`]}"`;
                    }
                    if (i === selectLineIndex) cls += " selected";
                    html += `<div class="${cls}" data-line-idx="${i}" onclick="selectRow(${i})"${style}><span style="color:#666;margin-right:12px;user-select:none;min-width:40px;display:inline-block;text-align:right;">${i+1}</span>${displayText}</div>`;
                }
                content.innerHTML = html;
                content.style.transform = `translateY(${startIdx * ROW_HEIGHT}px)`;
            }
            return;
        }
        try {
            const url = `${API_BASE}/api/log/search?file=${encodeURIComponent(currentFile)}&keyword=${encodeURIComponent(searchKeyword)}`;
            const data = await fetch(url).then(r=>r.json());
            matchLines = data?.matches || [];
            // 重新渲染可见区域以应用搜索高亮
            const box = $("#logBox");
            const content = box?.querySelector(".log-content");
            if (content) {
                const st = box.scrollTop;
                const ch = box.clientHeight;
                startIdx = Math.max(0, Math.floor(st / ROW_HEIGHT) - 20);
                endIdx = Math.min(allLines.length, Math.ceil((st + ch) / ROW_HEIGHT) + 20);
                let html = "";
                for (let i = startIdx; i < endIdx; i++) {
                    const text = allLines[i];
                    if (text === undefined || text === null) continue;
                    let displayText = text
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                    const reg = new RegExp(`(${escapeRegex(searchKeyword)})`, "gi");
                    displayText = displayText.replace(reg, '<span class="match">$1</span>');
                    let cls = "line";
                    let style = "";
                    if (markMap[`${currentFile}-${i}`]) {
                        style = ` style="background:${markMap[`${currentFile}-${i}`]}"`;
                    }
                    if (i === selectLineIndex) cls += " selected";
                    html += `<div class="${cls}" data-line-idx="${i}" onclick="selectRow(${i})"${style}><span style="color:#666;margin-right:12px;user-select:none;min-width:40px;display:inline-block;text-align:right;">${i+1}</span>${displayText}</div>`;
                }
                content.innerHTML = html;
                content.style.transform = `translateY(${startIdx * ROW_HEIGHT}px)`;
            }
            renderResultPanel();
        } catch(err) {
            alert("搜索接口异常：" + err.message);
            console.error("搜索报错：", err);
        }
    }

    function markCurrentLine() {
        if(!currentFile || selectLineIndex === null) {
            alert("请先点击选中一行日志");
            return;
        }
        const key = `${currentFile}-${selectLineIndex}`;
        markMap[key] = window.selectColor;
        localStorage.setItem("logMarkMap", JSON.stringify(markMap));
        renderVisible();
    }

    function clearAllMark() {
        if(!currentFile) return;
        const prefix = `${currentFile}-`;
        Object.keys(markMap).forEach(k=>{
            if(k.startsWith(prefix)) delete markMap[k];
        })
        localStorage.setItem("logMarkMap", JSON.stringify(markMap));
        renderVisible();
    }

    function bindEvent() {
        $$(".color-group span").forEach(sp => {
            sp.onclick = () => {
                window.selectColor = sp.dataset.color;
                $$(".color-group span").forEach(s=>s.classList.remove("active"));
                sp.classList.add("active");
            }
        })
        $("#searchBtn").onclick = doSearch;
        $("#markBtn").onclick = markCurrentLine;
        $("#copyBtn").onclick = () => {
            if(selectLineIndex === null) return alert("请先点击选中一行日志");
            const text = allLines[selectLineIndex];
            if(!text) return alert("该行内容为空");
            if(navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => alert("已复制到剪贴板"));
            } else {
                const ta = document.createElement("textarea");
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand("copy");
                document.body.removeChild(ta);
                alert("已复制到剪贴板");
            }
        };
        $("#clearMarkBtn").onclick = clearAllMark;
        $("#searchInput").addEventListener("keydown", e=>{
            if(e.key === "Enter") doSearch();
        })
    }

    function formatSize(b) {
        if(b < 1024) return b + "B";
        if(b < 1024*1024) return (b/1024).toFixed(1)+"KB";
        return (b/1024/1024).toFixed(2)+"MB";
    }
</script>
</body>
</html>
